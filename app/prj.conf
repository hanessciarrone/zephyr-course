CONFIG_GPIO=y
CONFIG_SENSOR=y
CONFIG_LOG=y

# console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SENSOR_SHELL=y

CONFIG_BLINK_SLEEP_PERIOD_1000MS=y
CONFIG_ADVANCED_LED_SETTINGS=n
CONFIG_LED_BRIGHTNESS=100
CONFIG_LED_FADE_DURATION=500

CONFIG_HANES_DRIVER=y
CONFIG_HANES_DRIVER_MESSAGE_MAX_LEN=30
